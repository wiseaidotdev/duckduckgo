name: Debian/RPM Packaging Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-debian:
    name: Build Debian Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential debhelper dh-cargo devscripts pkg-config libssl-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Build Debian package
        run: |
          debuild --preserve-envvar PATH -us -uc -b
          mkdir -p dist
          mv ../*.deb ./dist/

      - name: Upload Debian package artifact
        uses: actions/upload-artifact@v4
        with:
          name: debian-package
          path: dist/*.deb

  build-rpm:
    name: Build RPM Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm pkg-config libssl-dev
          sudo apt-get install -y rpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Prepare RPM build environment
        run: |
          mkdir -p ~/rpmbuild/{BUILD,BUILDROOT,RPMS,SOURCES,SPECS,SRPMS}
          cp rpm/ddg-rs.spec ~/rpmbuild/SPECS/
          
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=$(grep -m 1 "^version =" Cargo.toml | sed 's/.*"\(.*\)".*/\1/')-${GITHUB_SHA::8}
          fi
          
          VERSION_CLEAN=$(echo "$VERSION" | sed 's|/|-|g' | tr -d '\n\r')
          VERSION_ONLY=$(echo "${VERSION_CLEAN%%-*}" | tr -d '\n\r')
          
          sed -i "s@Version:.*\$@Version: $VERSION_ONLY@" ~/rpmbuild/SPECS/ddg-rs.spec
          
          tar -czvf ~/rpmbuild/SOURCES/ddg-rs-${VERSION_ONLY}.tar.gz --transform "s,^\.,ddg-rs-${VERSION_ONLY}," --exclude=.git .
          
          echo "VERSION_ONLY=$VERSION_ONLY" >> $GITHUB_ENV

      - name: Build RPM package
        run: |
          rpmbuild -bb --nodeps ~/rpmbuild/SPECS/ddg-rs.spec
          mkdir -p dist
          mv ~/rpmbuild/RPMS/*/*.rpm ./dist/

      - name: Upload RPM package artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: dist/*.rpm

  release:
    name: Publish Linux Packages Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-debian, build-rpm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: packages

      - name: Flatten packages directory
        run: |
          mkdir dist
          find packages -name '*.deb' -exec cp {} dist/ \;
          find packages -name '*.rpm' -exec cp {} dist/ \;

      - name: Extract metadata
        id: meta
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/*.deb
            dist/*.rpm
          fail_on_unmatched_files: false
